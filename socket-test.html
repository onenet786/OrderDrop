<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Test - ServeNow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .status.identified {
            background: #cce5ff;
            color: #004085;
        }
        .logs {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
        }
        .log-entry {
            margin: 3px 0;
            padding: 2px;
            border-left: 3px solid #667eea;
            padding-left: 8px;
        }
        .log-entry.error {
            border-left-color: #dc3545;
            color: #dc3545;
        }
        .log-entry.success {
            border-left-color: #28a745;
            color: #28a745;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        .user-info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Socket.IO Notification Test</h1>
        
        <div id="connectionStatus" class="status disconnected">
            Socket Connection: NOT CONNECTED
        </div>
        
        <div id="identificationStatus" class="status disconnected" style="display: none;">
            User Identification: NOT IDENTIFIED
        </div>
        
        <div class="user-info">
            <strong>Logged In User:</strong>
            <div id="userInfo">No user logged in</div>
            <button onclick="loadUserInfo()">Refresh User Info</button>
            <button onclick="loginTest()">Login Test User</button>
        </div>
        
        <h3>Controls</h3>
        <button onclick="testConnection()">Test Socket Connection</button>
        <button onclick="testIdentify()">Test User Identification</button>
        <button onclick="clearLogs()">Clear Logs</button>
        
        <h3>Logs</h3>
        <div id="logs" class="logs"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;

        const API_BASE = window.location.protocol + "//" + window.location.host;

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
            console.log(`[${type}] ${message}`);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        function loadUserInfo() {
            try {
                const user = JSON.parse(localStorage.getItem('serveNowUser') || '{}');
                const token = localStorage.getItem('serveNowToken');
                currentUser = user;
                
                if (user.id) {
                    document.getElementById('userInfo').innerHTML = `
                        <strong>ID:</strong> ${user.id}<br>
                        <strong>Name:</strong> ${user.first_name} ${user.last_name}<br>
                        <strong>Email:</strong> ${user.email}<br>
                        <strong>Type:</strong> ${user.user_type}<br>
                        <strong>Token:</strong> ${token ? token.substring(0, 20) + '...' : 'None'}
                    `;
                    log(`User loaded: ID=${user.id}, Type=${user.user_type}`, 'success');
                } else {
                    document.getElementById('userInfo').innerHTML = 'No user data in localStorage';
                    log('No user data found in localStorage', 'error');
                }
            } catch (e) {
                log(`Error loading user: ${e.message}`, 'error');
            }
        }

        function testConnection() {
            log('Starting socket connection test...');
            
            if (socket && socket.connected) {
                log('Socket already connected. Socket ID: ' + socket.id, 'success');
                updateConnectionStatus(true);
                return;
            }

            socket = io(API_BASE, {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                log(`Connected to server! Socket ID: ${socket.id}`, 'success');
                updateConnectionStatus(true);
            });

            socket.on('connect_error', (error) => {
                log(`Connection error: ${error}`, 'error');
                updateConnectionStatus(false);
            });

            socket.on('disconnect', (reason) => {
                log(`Disconnected: ${reason}`, 'error');
                updateConnectionStatus(false);
            });

            // Listen for test notifications
            socket.on('rider_notification', (data) => {
                log(`Received rider_notification: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('user_notification', (data) => {
                log(`Received user_notification: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('order_status_update', (data) => {
                log(`Received order_status_update: ${JSON.stringify(data)}`, 'success');
            });
        }

        function testIdentify() {
            loadUserInfo();
            
            if (!socket) {
                log('Socket not connected. Connecting first...', 'error');
                testConnection();
                setTimeout(testIdentify, 1000);
                return;
            }

            if (!socket.connected) {
                log('Socket not ready. Waiting...', 'error');
                setTimeout(testIdentify, 1000);
                return;
            }

            if (!currentUser || !currentUser.id) {
                log('No user data available. Please login first.', 'error');
                return;
            }

            log(`Sending identify_user: ID=${currentUser.id}, Type=${currentUser.user_type}`);
            socket.emit('identify_user', {
                user_id: currentUser.id,
                user_type: currentUser.user_type
            });

            log(`Identify_user emitted. Socket ID: ${socket.id}`, 'success');
            updateIdentificationStatus(true);
        }

        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            if (connected && socket) {
                status.className = 'status connected';
                status.textContent = `Socket Connection: CONNECTED (ID: ${socket.id})`;
            } else {
                status.className = 'status disconnected';
                status.textContent = 'Socket Connection: DISCONNECTED';
            }
        }

        function updateIdentificationStatus(identified) {
            const status = document.getElementById('identificationStatus');
            status.style.display = 'block';
            if (identified && currentUser) {
                status.className = 'status identified';
                status.textContent = `User Identification: IDENTIFIED (ID: ${currentUser.id}, Type: ${currentUser.user_type})`;
            } else {
                status.className = 'status disconnected';
                status.textContent = 'User Identification: NOT IDENTIFIED';
            }
        }

        function loginTest() {
            const email = prompt('Enter email for test:', 'test@servenow.com');
            const password = prompt('Enter password:', 'password123');
            
            if (!email || !password) return;

            log(`Attempting login with email: ${email}`);
            
            fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.token && data.user) {
                    localStorage.setItem('serveNowToken', data.token);
                    localStorage.setItem('serveNowUser', JSON.stringify(data.user));
                    log(`Login successful! User: ${data.user.first_name} ${data.user.last_name}`, 'success');
                    loadUserInfo();
                    testIdentify();
                } else {
                    log(`Login failed: ${data.message}`, 'error');
                }
            })
            .catch(e => log(`Login error: ${e}`, 'error'));
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            log('Page loaded. Socket.IO test ready.', 'success');
            loadUserInfo();
            testConnection();
        });
    </script>
</body>
</html>
