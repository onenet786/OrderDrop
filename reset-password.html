<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - OrderDrop</title>
    <link rel="stylesheet" href="css/user.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/servenow_brand_logo.png">
    <link rel="stylesheet" href="css/aginv-theme.css?v=1" />
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="images/servenow_brand_logo.png" alt="OrderDrop" onerror="this.src='https://placehold.co/32x32/667eea/ffffff?text=OD'">
                    <span>OrderDrop</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="stores.html"><i class="fas fa-store"></i> Stores</a></li>
                    <li><a href="orders.html"><i class="fas fa-box"></i> Orders</a></li>
                    <li><a href="wallet.html"><i class="fas fa-wallet"></i> Wallet</a></li>
                    <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCount" class="badge badge-credit" style="display: none;">0</span></a></li>
                    <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                    <li><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Header -->
        <header class="app-header">
            <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar navigation" title="Toggle sidebar navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-right">
                <div class="user-profile">
                    <span>Reset Password</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content">
            <!-- Toast Notification Container -->
            <div id="toastContainer" class="toast-container"></div>

            <div class="auth-wrapper">
                <div class="auth-card">
                    <div class="auth-header">
                        <img src="images/servenow_brand_logo.png" alt="OrderDrop Logo">
                        <h2>Create New Password</h2>
                        <p style="color: var(--text-muted); margin-top: 0.5rem;">Please enter your new password below.</p>
                    </div>
                    
                    <form id="resetPasswordForm">
                        <div class="form-group">
                            <label for="password">New Password</label>
                            <input type="password" id="password" name="password" required placeholder="Minimum 6 characters">
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your new password">
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-save"></i> Reset Password
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Back to <a href="login.html">Login</a></p>
                    </div>
                </div>
            </div>

            <footer class="app-footer">
                <p>&copy; 2026 OrderDrop. All rights reserved. Powered by OneNet Solutions Pakistan.</p>
            </footer>
        </main>
    </div>

    <script src="js/app.js?v=20"></script>
    <script>
        // Sidebar Toggle Logic
        const sidebarToggle = document.getElementById('sidebarToggle');
        const appSidebar = document.getElementById('appSidebar');

        if (sidebarToggle && appSidebar) {
            sidebarToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                appSidebar.classList.toggle('active');
            });
        }

        // Token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showError('Invalid Link', 'Password reset token is missing.');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        // Form Submission
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        if (resetPasswordForm) {
            resetPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (password !== confirmPassword) {
                    showWarning('Mismatch', 'Passwords do not match.');
                    return;
                }

                if (password.length < 6) {
                    showWarning('Too Short', 'Password must be at least 6 characters.');
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ token, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        showSuccess('Success', data.message);
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        showError('Error', data.message);
                    }
                } catch (error) {
                    console.error('Reset password error:', error);
                    showError('Error', 'Something went wrong. Please try again.');
                }
            });
        }
    </script>
</body>
</html>
