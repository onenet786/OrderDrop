<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard - ServeNow</title>
    <link rel="stylesheet" href="style/main.css?v=3">
    <link rel="stylesheet" href="style/responsive.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>ServeNow Rider</h1>
            </div>
            <button class="menu-toggle" aria-label="Toggle navigation menu" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Rider Dashboard</h2>

        <section class="rider-section">
            <div class="rider-info">
                <h3>Welcome, <span id="riderName"></span></h3>
                <p>Vehicle: <span id="riderVehicle"></span></p>
                <p>Current Location: <span id="currentLocation">Getting location...</span>
                    <button onclick="refreshLocation()" class="btn btn-small btn-primary" style="margin-left: 10px;">Refresh</button>
                </p>
            </div>

            <div class="rider-tabs">
                <button id="assignedTab" class="tab active">My Deliveries</button>
                <button id="completedTab" class="tab">Completed</button>
            </div>

            <div id="deliveriesContainer">
                <!-- Deliveries will be loaded dynamically -->
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025 SERVENOW. All Rights Reserved. Powered by: OneNet Solutions Pakistan</p>
    </footer>

    <script src="js/app.js?v=7"></script>
    <script src="js/rider.js"></script>
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.querySelector('nav ul');

        menuToggle.addEventListener('click', function(event) {
            event.stopPropagation();
            navMenu.classList.toggle('active');
            menuToggle.classList.toggle('active');
        });

        document.addEventListener('click', function(event) {
            if (!navMenu.contains(event.target) && !menuToggle.contains(event.target)) {
                navMenu.classList.remove('active');
                menuToggle.classList.remove('active');
            }
        });

        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                navMenu.classList.remove('active');
                menuToggle.classList.remove('active');
            });
        });
    </script>
</body>
</html>
