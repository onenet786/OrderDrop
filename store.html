<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="storeTitle">Store - ServeNow</title>
    <link rel="stylesheet" href="css/user.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/servenow.png">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="images/servenow.png" alt="ServeNow" onerror="this.src='https://placehold.co/32x32/667eea/ffffff?text=SN'">
                    <span>ServeNow</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="stores.html"><i class="fas fa-store"></i> Stores</a></li>
                    <li><a href="orders.html"><i class="fas fa-box"></i> Orders</a></li>
                    <li><a href="wallet.html"><i class="fas fa-wallet"></i> Wallet</a></li>
                    <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCount" class="badge badge-credit" style="display: none;">0</span></a></li>
                    <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                    <li><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Header -->
        <header class="app-header">
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-right">
                <div class="user-profile">
                    <span>Store Details</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content">
            <!-- Toast Notification Container -->
            <div id="toastContainer" class="toast-container"></div>

            <div id="storeInfo" class="store-banner">
                <!-- Store info will be loaded here -->
                <p>Loading store details...</p>
            </div>

            <h3 style="margin-bottom: 2rem; font-size: 1.5rem;">Menu</h3>
            <div id="storeProducts" class="product-grid">
                <!-- Products will be loaded here -->
                <p>Loading products...</p>
            </div>

            <footer class="app-footer">
                <p>© 2025 SERVENOW. All Rights Reserved. Powered by: OneNet Solutions Pakistan</p>
            </footer>
        </main>
    </div>

    <script src="js/app.js?v=7"></script>
    <script src="js/store.js?v=4"></script>
    <script>
        // Sidebar Toggle Logic
        const sidebarToggle = document.getElementById('sidebarToggle');
        const appSidebar = document.getElementById('appSidebar');

        if (sidebarToggle && appSidebar) {
            sidebarToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                appSidebar.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 1024) {
                    if (!appSidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                        appSidebar.classList.remove('active');
                    }
                }
            });
        }
    </script>
</body>
</html>
