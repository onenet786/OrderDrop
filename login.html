<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ServeNow</title>
    <link rel="stylesheet" href="style/main.css?v=3">
    <link rel="stylesheet" href="style/responsive.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/servenow.png">
</head>
<body class="login-body">
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <div class="login-container hanging-login-card">
        <section class="login-form">
            <div class="logo">
                <img src="images/servenow.png" alt="ServeNow Logo">
            </div>
            <h2>Login to ServeNow</h2>
            <form id="loginForm" action="#" method="post">
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </section>
    </div>

    <script src="js/app.js?v=7"></script>
    <footer>
        <p>© 2025 SERVENOW. All Rights Reserved. Powered by: OneNet Solutions Pakistan</p>
    </footer>
</body>
</html>
