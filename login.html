<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ServeNow</title>
    <link rel="stylesheet" href="css/user.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/servenow.png">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="images/servenow.png" alt="ServeNow" onerror="this.src='https://placehold.co/32x32/667eea/ffffff?text=SN'">
                    <span>ServeNow</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-menu">
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="stores.html"><i class="fas fa-store"></i> Stores</a></li>
                    <li><a href="orders.html"><i class="fas fa-box"></i> Orders</a></li>
                    <li><a href="wallet.html"><i class="fas fa-wallet"></i> Wallet</a></li>
                    <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCount" class="badge badge-credit" style="display: none;">0</span></a></li>
                    <li><a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                    <li><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Header -->
        <header class="app-header">
            <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar navigation" title="Toggle sidebar navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-right">
                <div class="user-profile">
                    <span>Login</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-content">
            <!-- Toast Notification Container -->
            <div id="toastContainer" class="toast-container"></div>

            <div class="auth-wrapper">
                <div class="auth-card">
                    <div class="auth-header">
                        <img src="images/servenow.png" alt="ServeNow Logo">
                        <h2>Welcome Back</h2>
                    </div>
                    
                    <form id="loginForm" action="#" method="post">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required placeholder="Enter your password">
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                    </div>
                </div>
            </div>

            <footer class="app-footer">
                <p>© 2025 SERVENOW. All Rights Reserved. Powered by: OneNet Solutions Pakistan</p>
            </footer>
        </main>
    </div>

    <script src="js/app.js?v=7"></script>
    <script>
        // Sidebar Toggle Logic
        const sidebarToggle = document.getElementById('sidebarToggle');
        const appSidebar = document.getElementById('appSidebar');
        const appContent = document.querySelector('.app-content');

        if (sidebarToggle && appSidebar) {
            sidebarToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                appSidebar.classList.toggle('active');
            });

            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 1024) {
                    if (!appSidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                        appSidebar.classList.remove('active');
                    }
                }
            });
        }
        
        // Update cart count if available
        document.addEventListener('DOMContentLoaded', () => {
             if (typeof updateCartCount === 'function') {
                updateCartCount();
            }
        });
    </script>
</body>
</html>
